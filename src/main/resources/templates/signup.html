<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Stellar Grooves - Sign Up</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        body { display: flex; align-items: center; height: 100vh; }
        .signup-form { width: 100%; max-width: 400px; padding: 15px; margin: auto; }
    </style>
</head>
<body>
    <div class="signup-form">
        <div class="card">
            <div class="card-body">
                <div class="logo-container">
                    <img th:src="@{/images/logo.png}" alt="Stellar Logo">
                    <h3 class="mt-2">Stellar Grooves</h3>
                </div>
                <div id="message" class="alert d-none"></div>
                <form id="signupForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Register</button>
                </form>
                <div class="mt-3 text-center">
                    Already have an account? <a href="/login">Login</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            
            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                if (response.ok) {
                    msg.className = 'alert alert-success';
                    msg.innerHTML = 'Registration successful! <a href="/login">Log in here</a>';
                    msg.classList.remove('d-none');
                } else {
                    const text = await response.text();
                    msg.className = 'alert alert-danger';
                    msg.innerText = 'Error: ' + text;
                    msg.classList.remove('d-none');
                }
            } catch (err) {
                msg.className = 'alert alert-danger';
                msg.innerText = 'An error occurred.';
                msg.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
